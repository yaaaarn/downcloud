name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun run tsc --noEmit

      - name: Publish to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > .npmrc
          published=$(npm view . version 2>/dev/null || echo "")
          current=$(node -p "require('./package.json').version")
          if [ "$published" != "$current" ]; then
            npm publish
          else
            echo "Version $current already published, skipping"
          fi

      - name: Build binaries
        run: |
          for target in \
            bun-linux-x64 \
            bun-linux-arm64 \
            bun-linux-x64-musl \
            bun-linux-arm64-musl \
            bun-darwin-x64 \
            bun-darwin-arm64 \
            bun-windows-x64 \
            bun-windows-arm64; do
            out="downcloud-${target#bun-}"
            [ "$target" != "${target#bun-windows}" ] && out="$out.exe"
            bun build --compile --minify --target "$target" src/index.ts --outfile "$out" &
          done
          wait

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            downcloud-linux-x64 \
            downcloud-linux-arm64 \
            downcloud-linux-x64-musl \
            downcloud-linux-arm64-musl \
            downcloud-darwin-x64 \
            downcloud-darwin-arm64 \
            "downcloud-windows-x64.exe" \
            "downcloud-windows-arm64.exe"
